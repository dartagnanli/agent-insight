# agent-insight 配置文件
# 放置于 ~/.agent-insight/config.yaml

storage:
  type: sqlite
  path: ""                          # 空=使用项目目录下 .agent-insight/insight.db
  retention_days: 30
  max_input_size: 10240             # 10KB, tool_input 截断阈值
  max_output_size: 10240            # 10KB, tool_output 截断阈值

collector:
  timeout_ms: 5000                  # 采集超时
  batch_size: 1                     # 写入批量大小
  async_write: true                 # 异步写入

dashboard:
  host: "127.0.0.1"
  port: 8080
  refresh_interval_ms: 1000         # 数据刷新间隔

stats:
  aggregation_interval: 5m          # 聚合刷新间隔

alerts:
  enabled: false
  rules: []
  channels: []

export:
  default_format: json

logging:
  level: "warn"                     # debug|info|warn|error
  path: ""                          # 空=stderr
